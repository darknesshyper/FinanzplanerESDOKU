<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übersicht</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <h1>Finanzplaner</h1>
    <span class="d-flex justify-content-evenly border border-dark p-2" >
    <img src="" alt="Logo">
    <a href="index.html"><button class="button">Startseite</button></a>
    <a href="uebersicht.html"><button class="button active">Übersicht</button></a>
    <a href="ausgaben.html"><button class="button">Ausgaben</button></a>
    <a href="einnahmen.html"><button class="button">Einnahmen</button></a>
    </span>

    <div class="transactions-container">
        <div class="transaction-card">
            <h3>Einnahmen</h3>
            <div class="table-container">
                <table class="transaction-table">
                    <tr>
                        <th>Bezeichnung</th>
                        <th>Geldbetrag</th>
                        <th>Kategorie</th>
                        <th>Datum</th>
                    </tr>
                    <tr>
                        <td>Kartoffeln</td>
                        <td>2€</td>
                        <td>Lebensmittel</td>
                        <td>14.04.2026</td>
                    </tr>
                </table>
            </div>
        </div>
        
        <div class="data-visual">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="flexSwitchCheckPiechart">
                <label for="flexSwitchCheckPiechart">Einnahmen/Ausgaben</label> <!--Ändert sich je nach Switch Position-->
            </div>
            <div class="piechart"></div>
            <p>Der Aktuelle Kontostand beträgt: </p>
            <p id="account-balance">2534,65€</p>
        </div>
        
        <div class="transaction-card">
            <h3>Ausgaben</h3>
            <div class="table-container">
                <table class="transaction-table">
                    <tr>
                        <th>Bezeichnung</th>
                        <th>Geldbetrag</th>
                        <th>Kategorie</th>
                        <th>Datum</th>
                    </tr>
                    <tr>
                        <td>Lohn Minijob</td>
                        <td>520€</td>
                        <td>Lohn</td>
                        <td>01.04.2026</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <a href="impressum.html">Impressum</a>
            <span class="separator">|</span>
            <a href="datenschutz.html">Datenschutzerklärung</a>
        </div>
    </footer>
    
</body>
</html>
