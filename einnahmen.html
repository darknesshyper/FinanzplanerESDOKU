    <link rel="stylesheet" href="stylesheet.css">

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary ">
        <div class="container-fluid">

            <img src="bilder/Finanzplaner_Logo.png" style="width:50px;height:50px;" alt="Logo" id="logo">
            <span class="navbar-brand ms-5">Finanzplaner</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="indexNachAnmelden.html">Startseite</a>
                    </li>

                        <a class="nav-link active" href="einnahmen.html">Einnahmen</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="kontostand.html" class="btn btn-outline-secondary d-flex align-items-center" title="Kontostand festlegen">

                    </a>
                    <a href="index.html" class="btn btn-outline-success">Logout</a>

    </nav>

    <div class="page-container">
        <div class="transaction-card me-lg-4 mb-4" >
            <h3>Neue Einnahme hinzufügen</h3>
            <div class="form-group">
                <label for="bezeichnung-einnahme">Bezeichnung</label>
                <input type="text" id="bezeichnung-einnahme" class="form-control" placeholder="z.B. Lohn Minijob">
            </div>
            <div class="form-group">
                <label for="betrag-einnahme">Geldbetrag (€)</label>
                <input type="number" id="betrag-einnahme" class="form-control" placeholder="z.B. 520">
            </div>
            <div class="form-group">
                <label for="kategorie-einnahme">Kategorie</label>
                <select class="form-control" id="kategorie-ausgabe">
                    <option value="gehalt">Gehalt/Lohn</option>
                    <option value="nebenjob">Nebenjob</option>
                    <option value="bonus">Bonus/Prämien</option>
                    <option value="zinsen">Zinsen</option>
                    <option value="mieteinnahmen">Mieteinnahmen</option>
                    <option value="leistungen">Staatliche Leistungen</option>
                    <option value="geschenke">Geschenke</option>
                    <option value="sonstiges">Sonstiges</option>
                </select>
            </div>
            <div class="form-group">
                <label for="datum-einnahme">Datum</label>
                <input type="date" id="datum-einnahme" class="form-control">
            </div>
             <button class="button" onclick="location.href='einnahmenFormularGefuellt.html'">Hinzufügen</button>
        </div>

        <div class="transaction-card">
            <h3>Einnahmen</h3>
            <div class="table-container">
                <table class="transaction-table">
                    <tr>
                        <th>Bezeichnung</th>
                        <th>Geldbetrag</th>
                        <th>Kategorie</th>
                        <th>Datum</th>
                    </tr>
                    <tr>
                        <td>Lohn Minijob</td>
                        <td>520€</td>
                        <td>Lohn</td>
                        <td>01.04.2026</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="data-visual">
            <div class="piechart"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <a href="impressumNachAnmelden.html">Impressum</a>
            <span class="separator">|</span>
            <a href="datenschutzNachAnmelden.html">Datenschutzerklärung</a>
        </div>
    </footer>

</html>
