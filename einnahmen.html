
<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einnahmen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    <h1>Finanzplaner</h1>
    <!-- Desktop Navigation -->
    <nav class="navbar-desktop">
        <img src="Finanzplaner_Logo.png" alt="Logo" id="logo">
        <a href="index.html"><button class="button">Startseite</button></a>
        <a href="uebersicht.html"><button class="button">Übersicht</button></a>
        <a href="ausgaben.html"><button class="button">Ausgaben</button></a>
        <a href="einnahmen.html"><button class="button active">Einnahmen</button></a>
    </nav>

    <!-- Mobile Navigation -->
    <details class="navbar-mobile">
        <summary>☰ Menü</summary>
        <nav class="mobile-menu">
            <img src="Finanzplaner_Logo.png" alt="Logo" id="logo">
            <a href="index.html"><button class="button">Startseite</button></a>
            <a href="uebersicht.html"><button class="button">Übersicht</button></a>
            <a href="ausgaben.html"><button class="button">Ausgaben</button></a>
            <a href="einnahmen.html"><button class="button active">Einnahmen</button></a>
        </nav>
    </details>

    <div class="page-container">
        <div class="transaction-card" Style="margin-right: 20px; height: auto;">
            <h3>Neue Einnahme hinzufügen</h3>
            <div class="form-group">
                <label for="bezeichnung-einnahme">Bezeichnung</label>
                <input type="text" id="bezeichnung-einnahme" class="form-control" placeholder="z.B. Lohn Minijob">
            </div>
            <div class="form-group">
                <label for="betrag-einnahme">Geldbetrag (€)</label>
                <input type="number" id="betrag-einnahme" class="form-control" placeholder="z.B. 520">
            </div>
            <div class="form-group">
                <label for="kategorie-einnahme">Kategorie</label>
                <input type="text" id="kategorie-einnahme" class="form-control" placeholder="z.B. Lohn">
            </div>
            <div class="form-group">
                <label for="datum-einnahme">Datum</label>
                <input type="date" id="datum-einnahme" class="form-control">
            </div>
            <button class="button">Hinzufügen</button>
        </div>

        <div class="transaction-card">
            <h3>Einnahmen</h3>
            <div class="table-container">
                <table class="transaction-table">
                    <tr>
                        <th>Bezeichnung</th>
                        <th>Geldbetrag</th>
                        <th>Kategorie</th>
                        <th>Datum</th>
                    </tr>
                    <tr>
                        <td>Lohn Minijob</td>
                        <td>520€</td>
                        <td>Lohn</td>
                        <td>01.04.2026</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="data-visual">
            <div class="piechart"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <a href="impressum.html">Impressum</a>
            <span class="separator">|</span>
            <a href="datenschutz.html">Datenschutzerklärung</a>
        </div>
    </footer>
</body>

</html>
