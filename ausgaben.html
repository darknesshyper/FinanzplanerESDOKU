    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary ">
        <div class="container-fluid">

            <img src="bilder/Finanzplaner_Logo.png" style="width:50px;height:50px;" alt="Logo" id="logo">
            <span class="navbar-brand ms-5">Finanzplaner</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">

                    Logout
                </a>
            </div>
        </div>

    <div class="page-container">
        <div class="transaction-card me-lg-4 mb-4">
            <h3>Neue Ausgabe hinzufügen</h3>
            <div class="form-group">
                <label for="bezeichnung-ausgabe">Bezeichnung</label>
                <input type="text" id="bezeichnung-ausgabe" class="form-control" placeholder="z.B. Kartoffeln">
            </div>
            <div class="form-group">
                <label for="betrag-ausgabe">Geldbetrag (€)</label>
                <input type="number" id="betrag-ausgabe" class="form-control" placeholder="z.B. 2">
            </div>
            <div class="form-group">
                <label for="kategorie-ausgabe">Kategorie</label>
                <select id="kategorie-ausgabe" class="form-control">
                    <option value="miete">Miete/Wohnen</option>
                    <option value="nebenkosten">Nebenkosten</option>
                    <option value="lebensmittel">Lebensmittel</option>
                    <option value="transport">Transport/Benzin</option>
                    <option value="versicherung">Versicherungen</option>
                    <option value="internet">Internet/Handy</option>
                    <option value="freizeit">Freizeit</option>
                    <option value="restaurants">Restaurants/Essen gehen</option>
                    <option value="kleidung">Kleidung</option>
                    <option value="gesundheit">Gesundheit/Apotheke</option>
                    <option value="abonnements">Abonnements</option>
                    <option value="bildung">Bildung/Weiterbildung</option>
                    <option value="reisen">Reisen/Urlaub</option>
                    <option value="haushalt">Haushalt</option>
                    <option value="sonstiges">Sonstiges</option>
                </select>
            </div>
            <div class="form-group">
                <label for="datum-ausgabe">Datum</label>
                <input type="date" id="datum-ausgabe" class="form-control">
            </div>
            <button class="button" onclick="location.href='ausgabenFormularGefuellt.html'">Hinzufügen</button>
        </div>

        <div class="transaction-card">
            <h3>Ausgaben</h3>
            <div class="form-group">
                <select id="kategorie-ausgabe-uebersicht" class="form-control">
                    <option value="all">Alle Kategorien</option>
                    <option value="miete">Miete/Wohnen</option>
                    <option value="nebenkosten">Nebenkosten</option>
                    <option value="lebensmittel">Lebensmittel</option>
                    <option value="transport">Transport/Benzin</option>
                    <option value="versicherung">Versicherungen</option>
                    <option value="internet">Internet/Handy</option>
                    <option value="freizeit">Freizeit</option>
                    <option value="restaurants">Restaurants/Essen gehen</option>
                    <option value="kleidung">Kleidung</option>
                    <option value="gesundheit">Gesundheit/Apotheke</option>
                    <option value="abonnements">Abonnements</option>
                    <option value="bildung">Bildung/Weiterbildung</option>
                    <option value="reisen">Reisen/Urlaub</option>
                    <option value="haushalt">Haushalt</option>
                    <option value="sonstiges">Sonstiges</option>
                </select>
            </div>
            <div class="table-container">
                <table class="transaction-table">
                    <tr>
                        <th>Bezeichnung</th>
                        <th>Geldbetrag</th>
                        <th>Kategorie</th>
                        <th>Datum</th>
                    </tr>
                    <tr>
                        <td>Kartoffeln</td>
                        <td>2€</td>
                        <td>Lebensmittel</td>
                        <td>14.04.2026</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="data-visual">
            <div class="piechart"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <a href="impressumNachAnmelden.html">Impressum</a>
            <span class="separator">|</span>
            <a href="datenschutzNachAnmelden.html">Datenschutzerklärung</a>
        </div>
    </footer>
</body>

</html>
