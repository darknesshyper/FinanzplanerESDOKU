
<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    
    <nav class="navbar navbar-expand-lg bg-body-tertiary ">
        <div class="container-fluid">

            <img src="Finanzplaner_Logo.png" style="width:50px;height:50px;" alt="Logo" id="logo">
            <span class="navbar-brand ms-5">Finanzplaner</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="index.html">Startseite</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="uebersicht.html">Übersicht</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="ausgaben.html">Ausgaben</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="einnahmen.html">Einnahmen</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="transaction-card" Style="margin-right: 20px; height: auto;">
            <h3>Neue Ausgabe hinzufügen</h3>
            <div class="form-group">
                <label for="bezeichnung-ausgabe">Bezeichnung</label>
                <input type="text" id="bezeichnung-ausgabe" class="form-control" placeholder="z.B. Kartoffeln">
            </div>
            <div class="form-group">
                <label for="betrag-ausgabe">Geldbetrag (€)</label>
                <input type="number" id="betrag-ausgabe" class="form-control" placeholder="z.B. 2">
            </div>
            <div class="form-group">
                <label for="kategorie-ausgabe">Kategorie</label>
                <input type="text" id="kategorie-ausgabe" class="form-control" placeholder="z.B. Lebensmittel">
            </div>
            <div class="form-group">
                <label for="datum-ausgabe">Datum</label>
                <input type="date" id="datum-ausgabe" class="form-control">
            </div>
            <button class="button">Hinzufügen</button>
        </div>

        <div class="transaction-card">
            <h3>Ausgaben</h3>
            <div class="table-container">
                <table class="transaction-table">
                    <tr>
                        <th>Bezeichnung</th>
                        <th>Geldbetrag</th>
                        <th>Kategorie</th>
                        <th>Datum</th>
                    </tr>
                    <tr>
                        <td>Kartoffeln</td>
                        <td>2€</td>
                        <td>Lebensmittel</td>
                        <td>14.04.2026</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="data-visual">
            <div class="piechart"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <a href="impressum.html">Impressum</a>
            <span class="separator">|</span>
            <a href="datenschutz.html">Datenschutzerklärung</a>
        </div>
    </footer>
</body>

</html>
